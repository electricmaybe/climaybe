# On tag v*: run tests and verify the tag matches package.json (no npm publish).
# Publishing runs in release-version.yml (semantic-release on push to main).
# Tags must be created by the Release version workflow (semantic-release on main).
# Do not create tags manually — tag and package.json can drift (e.g. tag v1.4.0, package 1.3.3).
name: Verify release tag

on:
  push:
    tags:
      - 'v*'

jobs:
  verify:
    name: Test and verify tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node scripts/run-tests.js

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PKG=$(node -p "require('./package.json').version")
          if [ "v${PKG}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match package.json version ${PKG}. Removing invalid tag."
            git push origin --delete "${TAG}"
            exit 1
          fi
