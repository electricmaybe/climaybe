name: Build

on:
  workflow_call:
    outputs:
      build-success:
        description: "Whether build was successful"
        value: ${{ jobs.build.outputs.success }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      success: ${{ steps.build.outputs.success }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Detect build entrypoints
        id: detect
        run: |
          HAS_SCRIPTS=false
          if ls _scripts/*.js >/dev/null 2>&1; then
            HAS_SCRIPTS=true
          fi
          HAS_STYLES=false
          if [ -f "_styles/main.css" ]; then
            HAS_STYLES=true
          fi
          echo "has_scripts=$HAS_SCRIPTS" >> $GITHUB_OUTPUT
          echo "has_styles=$HAS_STYLES" >> $GITHUB_OUTPUT
          BRANCH_NAME="${{ github.head_ref || github.ref_name }}"
          if [[ "$BRANCH_NAME" == live-* ]]; then
            echo "scripts_minify=true" >> $GITHUB_OUTPUT
          else
            echo "scripts_minify=false" >> $GITHUB_OUTPUT
          fi

      - name: Build scripts
        if: steps.detect.outputs.has_scripts == 'true'
        run: |
          if [ "${{ steps.detect.outputs.scripts_minify }}" = "true" ]; then
            npx -y climaybe@latest build-scripts --minify
          else
            npx -y climaybe@latest build-scripts
          fi

      - name: Run Tailwind build
        id: build
        run: |
          if [ "${{ steps.detect.outputs.has_styles }}" = "true" ]; then
            NODE_ENV=production npx -y climaybe@latest build
          else
            echo "No _styles/main.css found; skipping Tailwind build."
          fi
          echo "success=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          BRANCH_NAME=${{ github.head_ref || github.ref_name }}
          git fetch origin "$BRANCH_NAME" || echo "Branch does not exist yet"
          git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME" 2>/dev/null || git checkout -B "$BRANCH_NAME"
          if ls assets/*.js >/dev/null 2>&1; then
            git add -f assets/*.js
          fi
          if [ -f "assets/style.css" ]; then
            git add -f assets/style.css
          fi
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(assets): update compiled javascript and css"
            git push origin "$BRANCH_NAME"
          fi
